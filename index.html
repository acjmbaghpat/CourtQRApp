<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court Proforma System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans Devanagari',sans-serif;
  background:#f2f4f7;
  padding:15px;
}
h2{text-align:center;}
button{
  padding:10px;
  margin:5px 0;
  width:100%;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#1976d2;
  color:white;
}
input,textarea,select{
  width:100%;
  padding:8px;
  margin:5px 0;
}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
.hidden{display:none;}

#editor{
  background:white;
  padding:40px;
  margin-top:20px;
  min-height:100vh;
}

@media print{
  body *{visibility:hidden;}
  #editor,#editor *{visibility:visible;}
  #editor{
    position:absolute;
    left:0;
    top:0;
    width:100%;
  }
}
</style>
</head>

<body>

<h2>⚖️ Court Proforma System</h2>

<div class="card">
<button onclick="startScanner()">📷 QR Scan</button>
<input type="text" id="searchCase" placeholder="Case No search kare">
<button onclick="manualSearch()">🔍 Search</button>
<p id="scanResult"></p>
<video id="video" width="100%" class="hidden"></video>
</div>

<div id="formSection" class="card hidden">
<h3>Case Entry</h3>
<input type="text" id="caseNo" readonly>
<input type="text" id="section" placeholder="धारा (U/S)">
<input type="text" id="ps" placeholder="थाना">
<input type="text" id="ccno" placeholder="सी.सी. संख्या">
<input type="date" id="niyatDate">

<div id="accusedContainer"></div>
<button onclick="addAccused()">➕ अभियुक्त जोड़ें</button>
<button onclick="saveCase()">💾 सेव करें</button>
</div>

<div id="accusedListSection" class="card hidden">
<h3>अभियुक्त चुनें</h3>
<div id="accusedList"></div>
</div>

<div id="orderSection" class="card hidden">
<h3>आदेश प्रकार चुनें</h3>
<select id="orderType">
<option value="Summons">समन</option>
<option value="BW">जमानती वारंट</option>
<option value="NBW">गैर जमानती वारंट</option>
<option value="82">धारा 82</option>
<option value="83">धारा 83</option>
</select>
<button onclick="generateProforma()">📄 प्रपत्र तैयार करें</button>
</div>

<div id="editor" contenteditable="true" class="hidden"></div>

<div id="editorButtons" class="hidden">
<button onclick="window.print()">🖨 PDF Generate / Print</button>
<button onclick="closeEditor()">❌ Close Editor</button>
</div>

<script>

let currentCase=null;
let selectedAccused=null;

function startScanner(){
  const codeReader=new ZXing.BrowserQRCodeReader();
  const video=document.getElementById('video');
  video.classList.remove('hidden');

  codeReader.decodeFromVideoDevice(null,'video',(result,err)=>{
    if(result){
      let caseNo=result.text.trim();
      document.getElementById('scanResult').innerText="स्कैन केस: "+caseNo;
      video.classList.add('hidden');
      loadCase(caseNo);
    }
  });
}

function manualSearch(){
  let caseNo=document.getElementById('searchCase').value.trim();
  if(caseNo===""){alert("Case No डालें");return;}
  loadCase(caseNo);
}

function loadCase(caseNo){
  let data=localStorage.getItem(caseNo);
  if(data){
    currentCase=JSON.parse(data);
    showAccusedList();
  }else{
    currentCase={caseNo:caseNo,accused:[]};
    document.getElementById('formSection').classList.remove('hidden');
    document.getElementById('caseNo').value=caseNo;
    document.getElementById('accusedContainer').innerHTML="";
    addAccused();
  }
}

function addAccused(){
  let div=document.createElement('div');
  div.innerHTML=`
  <input class="accName" placeholder="अभियुक्त नाम">
  <input class="accFather" placeholder="पिता का नाम">
  <textarea class="accAddress" placeholder="पूरा पता"></textarea>
  <hr>`;
  document.getElementById('accusedContainer').appendChild(div);
}

function saveCase(){
  currentCase.section=document.getElementById('section').value;
  currentCase.ps=document.getElementById('ps').value;
  currentCase.ccno=document.getElementById('ccno').value;
  currentCase.niyatDate=document.getElementById('niyatDate').value;
  currentCase.accused=[];

  let names=document.querySelectorAll('.accName');
  let fathers=document.querySelectorAll('.accFather');
  let addresses=document.querySelectorAll('.accAddress');

  for(let i=0;i<names.length;i++){
    if(names[i].value.trim()!==""){
      currentCase.accused.push({
        name:names[i].value,
        father:fathers[i].value,
        address:addresses[i].value
      });
    }
  }

  localStorage.setItem(currentCase.caseNo,JSON.stringify(currentCase));
  showAccusedList();
}

function showAccusedList(){
  document.getElementById('formSection').classList.add('hidden');
  document.getElementById('accusedListSection').classList.remove('hidden');
  let list=document.getElementById('accusedList');
  list.innerHTML="";
  currentCase.accused.forEach(acc=>{
    let btn=document.createElement('button');
    btn.innerText=acc.name;
    btn.onclick=function(){
      selectedAccused=acc;
      document.getElementById('orderSection').classList.remove('hidden');
    };
    list.appendChild(btn);
  });
}

function generateProforma(){

  let type=document.getElementById('orderType').value;
  let editor=document.getElementById('editor');

  let ccno=currentCase.ccno?currentCase.ccno:"";
  let niyat=currentCase.niyatDate?currentCase.niyatDate:"";

  let leftHeading="";
  if(type==="Summons") leftHeading="सम्मन अभियुक्त -";
  if(type==="BW") leftHeading="जमानती वारंट अभियुक्त -";
  if(type==="NBW") leftHeading="गैर जमानती वारंट अभियुक्त -";
  if(type==="82") leftHeading="धारा 82 दं.प्र.सं. उद्घोषणा -";
  if(type==="83") leftHeading="धारा 83 दं.प्र.सं. कुर्की आदेश -";

  editor.innerHTML=`
  <div style="text-align:center;font-weight:bold;font-size:18px;">
  अपर मुख्य न्यायिक मजिस्ट्रेट, बागपत
  </div>
  <br>

  <div style="display:flex;justify-content:space-between;">
    <div style="width:50%;font-weight:bold;">
      ${leftHeading}
    </div>

    <div style="width:50%;text-align:right;">
      वाद संख्या: ${currentCase.caseNo}<br>
      राज्य बनाम: ${selectedAccused.name}<br>
      थाना: ${currentCase.ps}<br>
      धारा: ${currentCase.section}<br>
      सी.सी. संख्या: ${ccno}<br>
      नियत दिनांक: ${niyat}
    </div>
  </div>

  <br><br>

  अभियुक्त: ${selectedAccused.name}<br>
  पिता का नाम: ${selectedAccused.father}<br>
  पता: ${selectedAccused.address}

  <br><br><br><br><br>

  <div style="text-align:right;">
  अपर मुख्य न्यायिक मजिस्ट्रेट<br>
  बागपत
  </div>
  `;

  editor.classList.remove('hidden');
  document.getElementById('editorButtons').classList.remove('hidden');
  window.scrollTo(0,document.body.scrollHeight);
}

function closeEditor(){
  document.getElementById('editor').classList.add('hidden');
  document.getElementById('editorButtons').classList.add('hidden');
}

</script>

</body>
</html>
