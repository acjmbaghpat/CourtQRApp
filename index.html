<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court File Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:system-ui;background:#f2f4f7;margin:0;padding:10px}
.section{background:#fff;padding:14px;margin-bottom:12px;border-radius:12px}
input,button,select{width:100%;padding:12px;margin-top:8px;font-size:15px;border-radius:10px;border:1px solid #ccc}
button{background:#1976d2;color:#fff;border:none}

.dashboard{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.card{background:#fff;padding:10px;border-radius:10px;text-align:center}

.table-wrap{background:#fff;border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
th,td{border:1px solid #ddd;padding:6px;font-size:13px}

.highlight{background:#fff3cd}

.floating-scan{
position:fixed;
bottom:20px;
right:15px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}
.floating-scan button{width:150px}

#scannerWrap{position:fixed;inset:0;background:#000;display:none}
#video{width:100%;height:75vh}
</style>
</head>

<body>

<div class="section">
<input type="date" id="workDate">
<select id="versionSelect"></select>
</div>

<div class="dashboard">
<div class="card">Total <span id="totalCount">0</span></div>
<div class="card">Sent <span id="sentCount">0</span></div>
<div class="card">Received <span id="receivedCount">0</span></div>
<div class="card">Storage <span id="storageUsage">...</span></div>
</div>

<div class="section">
<input type="file" id="excelFile">
<button onclick="uploadExcel()">Upload Excel</button>
</div>

<div class="section">
<input type="text" id="searchBox" placeholder="Search">
</div>

<div class="section">
<button onclick="downloadExcel()">Download Excel</button>
</div>

<div class="table-wrap">
<table id="table"></table>
</div>

<div class="section">
<button onclick="deleteOldData()">Delete Old Data</button>
</div>

<div class="floating-scan">
<button onclick="scanSent()">📤 SENT</button>
<button onclick="scanReceived()">📥 RECEIVED</button>
</div>

<div id="scannerWrap">
<div id="video"></div>
<button onclick="stopScanner()">Close</button>
</div>

<script>

// ===== DB =====
const DB_NAME='CourtDB';
const STORE='data';
let db;

function openDB(){
return new Promise((res)=>{
let req=indexedDB.open(DB_NAME,1);
req.onupgradeneeded=e=>{
e.target.result.createObjectStore(STORE,{keyPath:'key'});
};
req.onsuccess=e=>{db=e.target.result;res();}
});
}

function setData(key,val){
let tx=db.transaction(STORE,'readwrite');
tx.objectStore(STORE).put({key,value:val});
}

function getData(key){
return new Promise(res=>{
let tx=db.transaction(STORE,'readonly');
let r=tx.objectStore(STORE).get(key);
r.onsuccess=()=>res(r.result?r.result.value:[]);
});
}

// ===== STATE =====
let currentData=[];
let scanMode="";
let html5Qr=null;
let lastScan="";
let remarkTimeout;

// ===== INIT =====
window.onload=async()=>{
await openDB();
currentData=await getData("data");
drawTable(currentData);
updateDashboard();
updateStorage();
};

// ===== STORAGE =====
async function updateStorage(){
if(navigator.storage){
let e=await navigator.storage.estimate();
storageUsage.innerText=(e.usage/1048576).toFixed(2)+"MB";
}
}

// ===== DASHBOARD =====
function updateDashboard(){
totalCount.innerText=currentData.length;
sentCount.innerText=currentData.filter(x=>x.sent).length;
receivedCount.innerText=currentData.filter(x=>x.received).length;
}

// ===== EXCEL =====
function uploadExcel(){
let file=excelFile.files[0];
let reader=new FileReader();

reader.onload=e=>{
let wb=XLSX.read(e.target.result,{type:"binary"});
let rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
rows.shift();

currentData=rows.map(r=>({
caseno:String(r[1]||""),
party:r[2]||"",
sent:"",
received:"",
remark:""
})).filter(r=>r.caseno);

// duplicate remove
let seen=new Set();
currentData=currentData.filter(r=>{
if(seen.has(r.caseno)) return false;
seen.add(r.caseno);
return true;
});

save();
drawTable(currentData);
updateDashboard();
};

reader.readAsBinaryString(file);
}

// ===== SAVE =====
async function save(){
await setData("data",currentData);
updateStorage();
}

// ===== SEARCH =====
searchBox.oninput=()=>{
drawTable(currentData.filter(r=>
JSON.stringify(r).toLowerCase().includes(searchBox.value.toLowerCase())
));
};

// ===== SCANNER =====
function scanSent(){scanMode="sent";startScanner();}
function scanReceived(){scanMode="received";startScanner();}

async function startScanner(){
scannerWrap.style.display="block";
html5Qr=new Html5Qrcode("video");
let cam=(await Html5Qrcode.getCameras())[0];
html5Qr.start(cam.id,{fps:10},txt=>handleScan(txt));
}

function stopScanner(){
if(html5Qr){html5Qr.stop();html5Qr.clear();}
scannerWrap.style.display="none";
}

function handleScan(code){

if(code===lastScan) return;
lastScan=code;

let i=currentData.findIndex(r=>r.caseno===code);
if(i==-1){alert("Not found");return;}

if(scanMode==="sent"){
if(currentData[i].sent){alert("Already Sent");return;}
currentData[i].sent="Sent";
}

if(scanMode==="received"){
if(!currentData[i].sent){alert("Not sent yet");return;}
if(currentData[i].received){alert("Already Received");return;}
currentData[i].received="Received";
}

drawTable(currentData);
updateDashboard();
save();

// AUTO STOP
stopScanner();
}

// ===== TABLE =====
function drawTable(data){
if(!data.length){table.innerHTML="";return;}

let html="<tr><th>Case</th><th>Party</th><th>Sent</th><th>Received</th><th>Remark</th></tr>";

data.forEach(r=>{
html+=`<tr id="row_${r.caseno}">
<td>${r.caseno}</td>
<td>${r.party}</td>
<td style="${r.sent?'background:#fff3cd':''}">${r.sent||''}</td>
<td style="${r.received?'background:#c8e6c9':''}">${r.received||''}</td>
<td><input data-id="${r.caseno}" value="${r.remark||''}"></td>
</tr>`;
});

table.innerHTML=html;

// remark fix
setTimeout(()=>{
document.querySelectorAll('input[data-id]').forEach(inp=>{
let rec=currentData.find(r=>r.caseno===inp.dataset.id);

if(document.activeElement!==inp){
inp.value=rec.remark||"";
}

inp.oninput=()=>{
clearTimeout(remarkTimeout);
remarkTimeout=setTimeout(()=>{
rec.remark=inp.value;
save();
},300);
};
});
},0);
}

// ===== DOWNLOAD =====
function downloadExcel(){
let ws=XLSX.utils.json_to_sheet(currentData);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"data");
XLSX.writeFile(wb,"Court.xlsx");
}

// ===== DELETE =====
async function deleteOldData(){
await setData("data",[]);
currentData=[];
drawTable([]);
updateDashboard();
alert("Deleted");
}

</script>
</body>
</html>
