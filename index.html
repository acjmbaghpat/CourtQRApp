<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court QR Workflow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; padding:15px; background:#f2f4f7;}
h2 { text-align:center; }
button {
  padding:10px;
  margin:5px 0;
  width:100%;
  font-size:16px;
  border-radius:8px;
  border:none;
  background:#1976d2;
  color:white;
}
input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
}
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
.hidden { display:none; }
hr { margin:10px 0; }

.pdfTemplate {
  width: 210mm;
  padding: 20mm;
  font-size:14px;
}
.right { text-align:right; }
.center { text-align:center; }
</style>
</head>

<body>

<h2>📂 Court QR Workflow</h2>

<div class="card">
<button onclick="startScanner()">📷 Scan QR</button>
<p id="scanResult"></p>
<video id="video" width="100%" class="hidden"></video>
</div>

<div id="formSection" class="card hidden">
<h3>Case Entry</h3>
<input type="text" id="caseNo" readonly>
<input type="text" id="section" placeholder="U/S">
<input type="text" id="ps" placeholder="Police Station">
<input type="text" id="complainant" placeholder="Complainant Name">

<div id="accusedContainer"></div>
<button onclick="addAccused()">➕ Add Accused</button>

<button onclick="saveCase()">💾 Save Case</button>
</div>

<div id="accusedListSection" class="card hidden">
<h3>Select Accused</h3>
<div id="accusedList"></div>
</div>

<div id="orderSection" class="card hidden">
<h3>Select Order Type</h3>

<label><input type="checkbox" value="Summons"> Summons</label><br>
<label><input type="checkbox" value="BW"> BW</label><br>
<label><input type="checkbox" value="NBW"> NBW</label><br>
<label><input type="checkbox" value="82 CrPC"> 82 CrPC</label><br>
<label><input type="checkbox" value="83 CrPC"> 83 CrPC</label><br><br>

<button onclick="generatePDF()">📄 Generate PDF</button>
</div>

<script>

let currentCase = null;
let selectedAccused = null;

function startScanner(){
  const codeReader = new ZXing.BrowserQRCodeReader();
  const video = document.getElementById('video');
  video.classList.remove('hidden');

  codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
    if(result){
      navigator.vibrate(200);
      let caseNo = result.text.trim();
      document.getElementById('scanResult').innerText = "Scanned Case: " + caseNo;
      video.classList.add('hidden');
      loadCase(caseNo);
    }
  });
}

function loadCase(caseNo){
  let data = localStorage.getItem(caseNo);
  if(data){
    currentCase = JSON.parse(data);
    showAccusedList();
  } else {
    currentCase = { caseNo: caseNo, accused: [] };
    document.getElementById('formSection').classList.remove('hidden');
    document.getElementById('caseNo').value = caseNo;
    addAccused();
  }
}

function addAccused(){
  let container = document.getElementById('accusedContainer');
  let div = document.createElement('div');
  div.innerHTML = `
    <input type="text" placeholder="Accused Name">
    <input type="text" placeholder="Father Name">
    <textarea placeholder="Full Address"></textarea>
    <hr>
  `;
  container.appendChild(div);
}

function saveCase(){
  currentCase.section = document.getElementById('section').value;
  currentCase.ps = document.getElementById('ps').value;
  currentCase.complainant = document.getElementById('complainant').value;

  currentCase.accused = [];

  let accusedDivs = document.querySelectorAll('#accusedContainer div');
  accusedDivs.forEach(div=>{
    let inputs = div.querySelectorAll('input, textarea');
    currentCase.accused.push({
      name: inputs[0].value,
      father: inputs[1].value,
      address: inputs[2].value
    });
  });

  localStorage.setItem(currentCase.caseNo, JSON.stringify(currentCase));
  alert("Case Saved Successfully ✅");
  location.reload();
}

function showAccusedList(){
  document.getElementById('accusedListSection').classList.remove('hidden');
  let list = document.getElementById('accusedList');
  list.innerHTML = "";

  currentCase.accused.forEach(acc=>{
    let btn = document.createElement('button');
    btn.innerText = acc.name + " (" + acc.father + ")";
    btn.onclick = function(){
      selectedAccused = acc;
      document.getElementById('orderSection').classList.remove('hidden');
    };
    list.appendChild(btn);
  });
}

async function generatePDF(){

  const { jsPDF } = window.jspdf;
  let checkboxes = document.querySelectorAll('#orderSection input[type=checkbox]:checked');

  if(!selectedAccused){
    alert("Select Accused First");
    return;
  }

  if(checkboxes.length === 0){
    alert("Select at least one Order Type");
    return;
  }

  let today = new Date().toLocaleDateString('en-GB');

  for (const box of checkboxes){

    let doc = new jsPDF();

    let htmlContent = `
      <div class="pdfTemplate">
        <div class="center"><b>अपर मुख्य न्यायिक मजिस्ट्रेट, बागपत</b></div>
        <br>

        <div class="right">
          <b>वाद संख्या:</b> ${currentCase.caseNo}<br>
          <b>राज्य बनाम:</b> ${selectedAccused.name}<br>
          <b>थाना:</b> ${currentCase.ps}<br>
          <b>धारा:</b> ${currentCase.section}<br>
          <b>दिनांक:</b> ${today}
        </div>

        <br><br>

        <b>अभियुक्त का विवरण:</b><br><br>
        नाम: ${selectedAccused.name}<br>
        पिता का नाम: ${selectedAccused.father}<br>
        पता: ${selectedAccused.address}<br><br>

        <b>आदेश प्रकार:</b> ${box.value}<br><br><br><br>

        <div class="right">
          अपर मुख्य न्यायिक मजिस्ट्रेट<br>
          बागपत
        </div>
      </div>
    `;

    await doc.html(htmlContent, {
      callback: function (doc) {
        let fileName = currentCase.caseNo + "_" +
                       selectedAccused.name + "_" +
                       box.value + "_" +
                       today.replaceAll("/","-") + ".pdf";

        doc.save(fileName);
      },
      x: 0,
      y: 0
    });

  }

  alert("PDF Generated Successfully ✅");
}

</script>

</body>
</html>
