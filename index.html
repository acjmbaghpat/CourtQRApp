<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Court QR Workflow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Noto Sans Devanagari', sans-serif;
  padding:15px;
  background:#f2f4f7;
}
h2 { text-align:center; }
button {
  padding:10px;
  margin:5px 0;
  width:100%;
  font-size:16px;
  border-radius:8px;
  border:none;
  background:#1976d2;
  color:white;
}
input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
}
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
.hidden { display:none; }

@media print {
  body * { visibility:hidden; }
  #printArea, #printArea * { visibility:visible; }
  #printArea {
    position:absolute;
    left:0;
    top:0;
    width:100%;
  }
}
</style>
</head>

<body>

<h2>📂 Court QR Workflow</h2>

<div class="card">
<button onclick="startScanner()">📷 Scan QR</button>
<p id="scanResult"></p>
<video id="video" width="100%" class="hidden"></video>
</div>

<div id="formSection" class="card hidden">
<h3>Case Entry</h3>
<input type="text" id="caseNo" readonly>
<input type="text" id="section" placeholder="धारा (U/S)">
<input type="text" id="ps" placeholder="थाना">
<input type="text" id="complainant" placeholder="राज्य / वादी">

<div id="accusedContainer"></div>
<button onclick="addAccused()">➕ अभियुक्त जोड़ें</button>
<button onclick="saveCase()">💾 सेव करें</button>
</div>

<div id="accusedListSection" class="card hidden">
<h3>अभियुक्त चुनें</h3>
<div id="accusedList"></div>
</div>

<div id="orderSection" class="card hidden">
<h3>आदेश प्रकार चुनें</h3>
<label><input type="radio" name="orderType" value="Summons"> समन</label><br>
<label><input type="radio" name="orderType" value="BW"> जमानती वारंट</label><br>
<label><input type="radio" name="orderType" value="NBW"> गैर जमानती वारंट</label><br>
<label><input type="radio" name="orderType" value="82"> धारा 82</label><br>
<label><input type="radio" name="orderType" value="83"> धारा 83</label><br><br>
<button onclick="generateProforma()">📄 प्रपत्र तैयार करें</button>
</div>

<div id="printArea" class="hidden"></div>

<script>

let currentCase = null;
let selectedAccused = null;

function startScanner(){
  const codeReader = new ZXing.BrowserQRCodeReader();
  const video = document.getElementById('video');
  video.classList.remove('hidden');

  codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
    if(result){
      let caseNo = result.text.trim();
      document.getElementById('scanResult').innerText = "स्कैन केस: " + caseNo;
      video.classList.add('hidden');
      loadCase(caseNo);
    }
  });
}

function loadCase(caseNo){
  let data = localStorage.getItem(caseNo);
  if(data){
    currentCase = JSON.parse(data);
    showAccusedList();
  } else {
    currentCase = { caseNo: caseNo, accused: [] };
    document.getElementById('formSection').classList.remove('hidden');
    document.getElementById('caseNo').value = caseNo;
    document.getElementById('accusedContainer').innerHTML = "";
    addAccused();
  }
}

function addAccused(){
  let container = document.getElementById('accusedContainer');
  let div = document.createElement('div');
  div.innerHTML = `
    <input class="accName" type="text" placeholder="अभियुक्त नाम">
    <input class="accFather" type="text" placeholder="पिता का नाम">
    <textarea class="accAddress" placeholder="पूरा पता"></textarea>
    <hr>
  `;
  container.appendChild(div);
}

function saveCase(){
  currentCase.section = document.getElementById('section').value;
  currentCase.ps = document.getElementById('ps').value;
  currentCase.complainant = document.getElementById('complainant').value;
  currentCase.accused = [];

  let names = document.querySelectorAll('.accName');
  let fathers = document.querySelectorAll('.accFather');
  let addresses = document.querySelectorAll('.accAddress');

  for(let i=0;i<names.length;i++){
    if(names[i].value.trim() !== ""){
      currentCase.accused.push({
        name:names[i].value,
        father:fathers[i].value,
        address:addresses[i].value
      });
    }
  }

  localStorage.setItem(currentCase.caseNo, JSON.stringify(currentCase));
  showAccusedList();
}

function showAccusedList(){
  document.getElementById('formSection').classList.add('hidden');
  document.getElementById('accusedListSection').classList.remove('hidden');
  let list=document.getElementById('accusedList');
  list.innerHTML="";
  currentCase.accused.forEach(acc=>{
    let btn=document.createElement('button');
    btn.innerText=acc.name;
    btn.onclick=function(){
      selectedAccused=acc;
      document.getElementById('orderSection').classList.remove('hidden');
    };
    list.appendChild(btn);
  });
}

function generateProforma(){

  let order=document.querySelector('input[name="orderType"]:checked');
  if(!order){ alert("आदेश चुनें"); return; }

  let today=new Date().toLocaleDateString('en-GB');

  document.getElementById('printArea').innerHTML=`
  <div style="padding:40px; font-size:16px;">
    <div style="text-align:center; font-weight:bold; font-size:18px;">
      अपर मुख्य न्यायिक मजिस्ट्रेट, बागपत
    </div>
    <br>
    <div style="text-align:right;">
      वाद संख्या: ${currentCase.caseNo}<br>
      राज्य बनाम: ${selectedAccused.name}<br>
      थाना: ${currentCase.ps}<br>
      धारा: ${currentCase.section}<br>
      दिनांक: ${today}
    </div>
    <br><br>
    अभियुक्त: ${selectedAccused.name}<br>
    पिता का नाम: ${selectedAccused.father}<br>
    पता: ${selectedAccused.address}<br><br><br>
    आदेश प्रकार: ${order.value}
    <br><br><br><br>
    <div style="text-align:right;">
      अपर मुख्य न्यायिक मजिस्ट्रेट<br>
      बागपत
    </div>
  </div>
  `;

  document.getElementById('printArea').classList.remove('hidden');
  window.print();
}

</script>

</body>
</html>
